<<div class="container mt-5" style="max-width:400px;">

  <div class="card p-4">

    <h3 class="mb-3">Login</h3>

    <input type="text"
           class="form-control mb-3"
           placeholder="Usuario"
           [(ngModel)]="usuario">

    <input type="password"
           class="form-control mb-3"
           placeholder="Password"
           [(ngModel)]="password">

    <button class="btn btn-primary w-100"
            (click)="login()">

      Ingresar

    </button>

  </div>

</div>
